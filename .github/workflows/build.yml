Name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Cordova and Resource Generator
        run: npm install -g cordova @cordova-res/cli
        
      - name: Generate Adaptive Icons
        # Perintah ini akan membaca config.xml dan membuat aset di folder res/
        # Pastikan file res/android/icon-foreground.png dan icon-background.png sudah ada di repo
        run: cordova-res android --skip-config --copy
        
      - name: Add Android Platform
        run: cordova platform add android@13
        
      - name: Build Android
        run: cordova build android
        
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
